<!DOCTYPE html>
<html>
<head>
  <title>LASNA - Read Aloud Corrector</title>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 1000px;
      margin: 50px auto;
      background: #ffffff;
      color: #1a1a2e;
      padding: 0 20px;
    }
    h2 { font-weight: 700; color: #1e3a8a; margin-bottom: 4px; }
    .subtitle { color: #5a6b8c; font-size: 14px; margin-bottom: 24px; }
    .card {
      background: white; border: 2px solid #1e3a8a; border-radius: 14px;
      padding: 20px; box-shadow: 0 4px 14px rgba(30, 58, 138, 0.08); margin-bottom: 20px;
    }
    textarea {
      width: 100%; font-size: 17px; padding: 14px; border: none;
      resize: vertical; font-family: inherit; background: transparent; color: #1a1a2e;
      min-height: 500px; line-height: 1.9;
    }
    textarea:focus { outline: none; }
    textarea::placeholder { color: #b0b8c9; }

    #readView {
      display: none; width: 100%; min-height: 500px; font-size: 17px; line-height: 1.9;
      padding: 14px; border: none; background: transparent; color: #1a1a2e;
      white-space: pre-wrap; overflow-y: auto;
    }
    #readView .flag { padding: 1px 2px; border-radius: 3px; }
    #readView .flag-spelling { text-decoration: underline wavy #d64545; text-decoration-thickness: 2px; }
    #readView .flag-grammar { text-decoration: underline wavy #1e3a8a; text-decoration-thickness: 2px; }
    #readView .flag-punctuation { text-decoration: underline wavy #6b3fa0; text-decoration-thickness: 2px; }
    #readView .flag-tense { text-decoration: underline wavy #4a2e8a; text-decoration-thickness: 2px; }
    #readView .speaking { background: #ffe9a8; }

    .main-layout { display: grid; grid-template-columns: 4fr 1fr; gap: 20px; align-items: start; }
    .text-column { min-width: 0; }
    .side-column { min-width: 0; display: flex; flex-direction: column; position: sticky; top: 20px; }

    #voiceSelect {
      margin-bottom: 10px; padding: 8px 10px; border-radius: 8px; border: 1px solid #a8bde0;
      background: #fbfdff; color: #1a1a2e; width: 100%; font-size: 13px;
    }

    .button-row { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .button-row button { width: 100%; text-align: center; }

    @media (max-width: 700px) {
      .main-layout { grid-template-columns: 1fr; }
      .side-column { width: 100%; }
    }

    button {
      border: none; border-radius: 30px; padding: 12px 16px; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: transform 0.05s ease;
    }
    button:active { transform: scale(0.97); }
    .btn-primary { background: #1e3a8a; color: white; }
    .btn-primary:hover { background: #16295e; }
    .btn-secondary { background: white; color: #1e3a8a; border: 2px solid #1e3a8a; }
    .btn-secondary:hover { background: #eef2ff; }
    .btn-success { background: #1e3a8a; color: white; }
    .btn-success:hover { background: #16295e; }
    .btn-warning { background: white; color: #1e3a8a; border: 2px solid #1e3a8a; }
    .btn-warning:hover { background: #eef2ff; }
    .btn-tense { background: #4a2e8a; color: white; }
    .btn-tense:hover { background: #3a2270; }

    #status { margin-top: 14px; font-size: 13px; color: #5a6b8c; font-style: italic; }
    #progress { font-size: 12px; color: #8a9ac0; margin-bottom: 4px; }

    .issue {
      border-left: 4px solid #d64545; background: #fef5f5; border-radius: 10px;
      padding: 14px 16px; margin: 10px 0; font-size: 13px;
    }
    .issue.grammar { border-left-color: #1e3a8a; background: #eef2ff; }
    .issue.punctuation { border-left-color: #6b3fa0; background: #f5eefc; }
    .issue.tense { border-left-color: #4a2e8a; background: #f0ecfa; }
    .issue .word { font-weight: 700; color: #d64545; text-decoration: line-through; }
    .issue .arrow { color: #a8bde0; }
    .issue .fix { font-weight: 700; color: #1e3a8a; }
    .issue small { color: #5a6b8c; display: block; margin-top: 4px; }
    .issue button { margin-top: 10px; background: #1e3a8a; color: white; padding: 6px 12px; font-size: 12px; }
    .issue button:hover { background: #16295e; }
    .empty-state { color: #8a9ac0; font-size: 14px; text-align: center; padding: 12px; }
    .badge {
      display: inline-block; background: #eef2ff; color: #1e3a8a; font-size: 10px;
      font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; margin-left: 6px;
    }
  </style>
</head>
<body>

  <h2>LASNA - Read Aloud Corrector</h2>
  <div class="subtitle">Listen to your writing and fix issues as you go</div>

  <div class="card" id="accountCard">
    <div id="loggedOutView">
      <div style="display:flex; gap:20px; flex-wrap:wrap; align-items:flex-end;">
        <div style="flex:1; min-width:200px;">
          <label style="font-size:13px; color:#5a6b8c;">Email</label>
          <input type="email" id="authEmail" style="width:100%; padding:10px; border:1px solid #a8bde0; border-radius:8px; margin-top:4px;">
        </div>
        <div style="flex:1; min-width:200px;">
          <label style="font-size:13px; color:#5a6b8c;">Password</label>
          <input type="password" id="authPassword" style="width:100%; padding:10px; border:1px solid #a8bde0; border-radius:8px; margin-top:4px;">
        </div>
        <button class="btn-primary" style="min-width:120px;" onclick="doLogin()">Log In</button>
        <button class="btn-secondary" style="min-width:120px;" onclick="doSignup()">Sign Up</button>
      </div>
      <div id="authStatus" style="font-size:13px; color:#5a6b8c; margin-top:8px;"></div>
    </div>

    <div id="loggedInView" style="display:none;">
      <span id="loggedInEmail" style="font-weight:700; color:#1e3a8a;"></span>
      <span id="loggedInType" style="color:#5a6b8c; margin-left:10px;"></span>
      <button class="btn-secondary" style="float:right; padding:8px 14px; font-size:12px;" onclick="doLogout()">Log Out</button>
    </div>
  </div>

  <!-- Shown once, right after signup, if no Author/Student choice has been made yet -->
  <div class="card" id="userTypeCard" style="display:none; text-align:center;">
    <p style="font-weight:700; color:#1e3a8a; margin-bottom:14px;">Are you an Author or a Student?</p>
    <button class="btn-primary" style="margin-right:10px; padding:14px 30px;" onclick="chooseUserType('author')">Author</button>
    <button class="btn-tense" style="padding:14px 30px;" onclick="chooseUserType('student')">Student</button>
  </div>

  <div class="card">
    <div class="main-layout">
      <div class="text-column">
        <textarea id="textInput" rows="8">Its a nice day however I dont want to go outside. She reaches for a book and cracks a smile.</textarea>
        <div id="readView"></div>
      </div>
      <div class="side-column">
        <select id="voiceSelect"></select>
        <div class="button-row">
          <button class="btn-primary" onclick="readAloud()">Read Aloud</button>
          <button class="btn-secondary" onclick="stopReading()">Stop</button>
          <button class="btn-secondary" onclick="scanText()">Check Writing</button>
          <button class="btn-tense" onclick="checkTense()">Check Tense</button>
          <button class="btn-success" onclick="applyAllChanges()">Apply All</button>
          <button class="btn-warning" onclick="undoChange()">Undo</button>
        </div>
      </div>
    </div>

    <div id="progress"></div>
    <div id="status">Ready.</div>
  </div>

  <div class="card">
    <div id="issuesList">
      <div class="empty-state">No issues checked yet - click "Check Writing" or "Check Tense" above.</div>
    </div>
  </div>

  <script>
    var currentSuggestions = [];
    var undoStack = [];
    var selectedVoice = null;
    var stopRequested = false;

    var CHUNK_SIZE = 15000;
    var LANGUAGETOOL_SERVER = "https://lasna.duckdns.org";
    var BACKEND_SERVER = "https://api.hellolasna.com";

    // ===== ACCOUNT MANAGEMENT =====
    var currentUser = null; // { email, isSubscribed, wordCount, userType }

    function saveSession() {
      if (currentUser) {
        localStorage.setItem("lasnaSession", JSON.stringify(currentUser));
      } else {
        localStorage.removeItem("lasnaSession");
      }
    }

    function loadSession() {
      var saved = localStorage.getItem("lasnaSession");
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          updateAccountView();
        } catch (e) {
          currentUser = null;
        }
      }
    }

    function updateAccountView() {
      var loggedOut = document.getElementById("loggedOutView");
      var loggedIn = document.getElementById("loggedInView");
      var userTypeCard = document.getElementById("userTypeCard");

      if (currentUser) {
        loggedOut.style.display = "none";
        loggedIn.style.display = "block";
        document.getElementById("loggedInEmail").innerText = currentUser.email;
        document.getElementById("loggedInType").innerText = currentUser.userType
          ? "(" + currentUser.userType.charAt(0).toUpperCase() + currentUser.userType.slice(1) + ")"
          : "";

        if (!currentUser.userType) {
          userTypeCard.style.display = "block";
        } else {
          userTypeCard.style.display = "none";
        }
      } else {
        loggedOut.style.display = "block";
        loggedIn.style.display = "none";
        userTypeCard.style.display = "none";
      }
    }

    function setAuthStatus(msg) {
      document.getElementById("authStatus").innerText = msg;
    }

    function doSignup() {
      var email = document.getElementById("authEmail").value;
      var password = document.getElementById("authPassword").value;

      if (!email || !password) {
        setAuthStatus("Please enter both an email and a password.");
        return;
      }

      setAuthStatus("Creating account...");
      fetch(BACKEND_SERVER + "/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.error) {
          setAuthStatus(data.error);
          return;
        }
        setAuthStatus("Account created! Logging you in...");
        doLoginWithCredentials(email, password);
      }).catch(function() {
        setAuthStatus("Could not reach the server. Please try again.");
      });
    }

    function doLogin() {
      var email = document.getElementById("authEmail").value;
      var password = document.getElementById("authPassword").value;
      doLoginWithCredentials(email, password);
    }

    function doLoginWithCredentials(email, password) {
      if (!email || !password) {
        setAuthStatus("Please enter both an email and a password.");
        return;
      }

      setAuthStatus("Logging in...");
      fetch(BACKEND_SERVER + "/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      }).then(function(r) { return r.json(); }).then(function(data) {
        if (data.error) {
          setAuthStatus(data.error);
          return;
        }
        currentUser = {
          email: data.email,
          isSubscribed: data.isSubscribed,
          wordCount: data.wordCount,
          userType: data.userType
        };
        saveSession();
        updateAccountView();
        setAuthStatus("");
      }).catch(function() {
        setAuthStatus("Could not reach the server. Please try again.");
      });
    }

    function doLogout() {
      currentUser = null;
      saveSession();
      updateAccountView();
    }

    function chooseUserType(type) {
      if (!currentUser) return;
      fetch(BACKEND_SERVER + "/api/set-user-type", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: currentUser.email, userType: type })
      }).then(function(r) { return r.json(); }).then(function() {
        currentUser.userType = type;
        saveSession();
        updateAccountView();
      });
    }

    loadSession();

    function setStatus(msg) { document.getElementById("status").innerText = msg; }
    function setProgress(msg) { document.getElementById("progress").innerText = msg; }

    // Normalizes paragraph spacing: whether the original had single or double
    // line breaks between paragraphs, this produces consistent, visible spacing
    // -- since word processors often create paragraph gaps through spacing
    // settings rather than an actual blank line, which gets lost when pasted
    // as plain text.
    function addParagraphSpacing(text) {
      var lines = text.split(/\n+/);
      var nonEmpty = lines
        .map(function(l) { return l.replace(/[ \t]+$/, ""); })
        .filter(function(l) { return l.trim().length > 0; });
      return nonEmpty.join("\n\n");
    }

    function setupPasteHandler() {
      var textarea = document.getElementById("textInput");
      textarea.addEventListener("paste", function(e) {
        e.preventDefault();
        var clipboardData = e.clipboardData || window.clipboardData;
        var pasted = clipboardData.getData("text/plain");
        var normalized = pasted.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
        var spaced = addParagraphSpacing(normalized);

        var start = textarea.selectionStart;
        var end = textarea.selectionEnd;
        var current = textarea.value;
        textarea.value = current.slice(0, start) + spaced + current.slice(end);

        var newPos = start + spaced.length;
        textarea.selectionStart = textarea.selectionEnd = newPos;
      });
    }
    setupPasteHandler();

    function loadVoices() {
      var voices = speechSynthesis.getVoices();
      var select = document.getElementById("voiceSelect");
      if (voices.length === 0) return;
      select.innerHTML = "";
      voices.forEach(function(voice, i) {
        var option = document.createElement("option");
        option.value = i;
        option.textContent = voice.name + " (" + voice.lang + ")";
        select.appendChild(option);
      });
      select.onchange = function() { selectedVoice = voices[select.value]; };
      selectedVoice = voices[0];
    }
    speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function splitIntoChunks(text, maxSize) {
      var chunks = [];
      var pos = 0;
      while (pos < text.length) {
        var end = Math.min(pos + maxSize, text.length);
        if (end < text.length) {
          var cut = -1;
          for (var i = end; i > pos; i--) {
            if (".!?".indexOf(text[i - 1]) !== -1 && (text[i] === " " || text[i] === "\n" || i === text.length)) {
              cut = i;
              break;
            }
          }
          if (cut > pos) end = cut;
        }
        chunks.push({ text: text.slice(pos, end), globalOffset: pos });
        pos = end;
      }
      return chunks;
    }

    function checkGrammarAndSpelling(text) {
      return fetch(LANGUAGETOOL_SERVER + "/v2/check", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ text: text, language: "en-US", level: "picky" })
      }).then(function(response) {
        return response.json();
      }).then(function(data) {
        return data.matches.map(function(match) {
          return {
            type: match.rule.category.id === "TYPOS" ? "spelling" : "grammar",
            start: match.offset,
            end: match.offset + match.length,
            originalText: text.slice(match.offset, match.offset + match.length),
            suggestion: match.replacements[0] ? match.replacements[0].value : null,
            message: match.message
          };
        });
      }).catch(function(err) {
        setStatus("Could not reach the grammar server. Please try again.");
        return [];
      });
    }

    function checkCustomPunctuation(text) {
      var results = [];
      var introWords = ["however", "therefore", "moreover", "meanwhile", "furthermore", "nonetheless", "consequently"];
      introWords.forEach(function(word) {
        var pattern = new RegExp("\\b(" + word + ")\\b(?!,)", "gi");
        var match;
        while ((match = pattern.exec(text)) !== null) {
          var afterChar = text[match.index + match[0].length];
          if (afterChar === ",") continue;
          results.push({
            type: "punctuation",
            start: match.index + match[0].length,
            end: match.index + match[0].length,
            originalText: "",
            suggestion: ",",
            message: 'Consider adding a comma after "' + match[0] + '".'
          });
        }
      });
      var trimmed = text.trim();
      if (trimmed.length > 0 && !/[.!?]$/.test(trimmed)) {
        results.push({
          type: "punctuation",
          start: text.length,
          end: text.length,
          originalText: "",
          suggestion: ".",
          message: "Sentence appears to be missing ending punctuation."
        });
      }
      return results;
    }

    function removeOverlaps(suggestions) {
      var sorted = suggestions.slice().sort(function(a, b) { return a.start - b.start; });
      var kept = [];
      var lastEnd = -1;
      sorted.forEach(function(s) {
        if (s.start < lastEnd) return;
        kept.push(s);
        lastEnd = Math.max(s.end, s.start);
      });
      return kept;
    }

    function checkChunk(chunk) {
      return checkGrammarAndSpelling(chunk.text).then(function(grammarAndSpelling) {
        var punctuation = checkCustomPunctuation(chunk.text);
        var combined = grammarAndSpelling.concat(punctuation);
        var local = removeOverlaps(combined);
        return local.map(function(s) {
          return {
            type: s.type,
            start: s.start + chunk.globalOffset,
            end: s.end + chunk.globalOffset,
            originalText: s.originalText,
            suggestion: s.suggestion,
            message: s.message
          };
        });
      });
    }

    function getSuggestionsForFullText(text) {
      var chunks = splitIntoChunks(text, CHUNK_SIZE);
      var all = [];
      var i = 0;
      function next() {
        if (i >= chunks.length) {
          setProgress("");
          return Promise.resolve(all);
        }
        setProgress("Checking part " + (i + 1) + " of " + chunks.length + "...");
        return checkChunk(chunks[i]).then(function(result) {
          all = all.concat(result);
          i++;
          return next();
        });
      }
      return next();
    }

    function scanText() {
      setStatus("Checking your writing...");
      var text = document.getElementById("textInput").value;
      getSuggestionsForFullText(text).then(function(suggestions) {
        currentSuggestions = suggestions;
        renderIssues();
        renderInlineHighlights(text, suggestions);
        setStatus("Found " + currentSuggestions.length + " issue(s).");
      });
    }

    // ===== TENSE CHECKING (bidirectional: past or present, whichever dominates) =====

    function maskDialogue(text) {
      var masked = text.replace(/"([^"]*)"/g, function(m, inner) {
        return '"' + new Array(inner.length + 1).join(" ") + '"';
      });
      var openQuote = String.fromCharCode(8220);
      var closeQuote = String.fromCharCode(8221);
      var curlyPattern = new RegExp(openQuote + "([^" + closeQuote + "]*)" + closeQuote, "g");
      masked = masked.replace(curlyPattern, function(m, inner) {
        return openQuote + new Array(inner.length + 1).join(" ") + closeQuote;
      });
      return masked;
    }

    function conjugatePresent(base) {
      if (/[^aeiou]y$/.test(base)) return base.slice(0, -1) + "ies";
      if (/(s|sh|ch|x|z|o)$/.test(base)) return base + "es";
      return base + "s";
    }

    function conjugatePast(base) {
      if (/e$/.test(base)) return base + "d";
      if (/[^aeiou]y$/.test(base)) return base.slice(0, -1) + "ied";
      if (/^[a-z]*[aeiou][^aeiouwxy]$/.test(base) && base.length <= 5) {
        return base + base.charAt(base.length - 1) + "ed";
      }
      return base + "ed";
    }

    var PRESENT_TO_PAST = {};
    Object.keys(IRREGULAR_PAIRS).forEach(function(present) {
      PRESENT_TO_PAST[present] = IRREGULAR_PAIRS[present];
    });
    REGULAR_VERB_BASES.forEach(function(base) {
      var present = conjugatePresent(base);
      var past = conjugatePast(base);
      if (!PRESENT_TO_PAST.hasOwnProperty(present)) {
        PRESENT_TO_PAST[present] = past;
      }
    });

    var PAST_TO_PRESENT = {};
    Object.keys(PRESENT_TO_PAST).forEach(function(presentWord) {
      var pastWord = PRESENT_TO_PAST[presentWord];
      if (!PAST_TO_PRESENT.hasOwnProperty(pastWord)) {
        PAST_TO_PRESENT[pastWord] = presentWord;
      }
    });

    function countTenseSignals(text) {
      var words = text.toLowerCase().match(/[a-z']+/g) || [];
      var past = 0;
      var present = 0;
      words.forEach(function(w) {
        if (PAST_TO_PRESENT.hasOwnProperty(w)) past++;
        else if (PRESENT_TO_PAST.hasOwnProperty(w)) present++;
      });
      return { past: past, present: present };
    }

    function matchCase(original, replacement) {
      if (original[0] === original[0].toUpperCase() && original[0] !== original[0].toLowerCase()) {
        return replacement.charAt(0).toUpperCase() + replacement.slice(1);
      }
      return replacement;
    }

    function checkTenseConsistency(text) {
      var masked = maskDialogue(text);
      var overall = countTenseSignals(masked);

      var dominant;
      if (overall.past >= 4 && overall.past >= overall.present * 1.5) {
        dominant = "past";
      } else if (overall.present >= 4 && overall.present >= overall.past * 1.5) {
        dominant = "present";
      } else {
        return { issues: [], dominant: "unclear" };
      }

      var issues = [];
      var wordPattern = /[A-Za-z']+/g;
      var match;
      while ((match = wordPattern.exec(masked)) !== null) {
        var word = match[0];
        var lower = word.toLowerCase();

        if (dominant === "past" && PRESENT_TO_PAST.hasOwnProperty(lower)) {
          var pastForm = matchCase(word, PRESENT_TO_PAST[lower]);
          issues.push({
            type: "tense",
            start: match.index,
            end: match.index + word.length,
            originalText: word,
            suggestion: pastForm,
            message: "Present tense in an otherwise past-tense narrative. Dialogue is excluded from this check."
          });
        } else if (dominant === "present" && PAST_TO_PRESENT.hasOwnProperty(lower)) {
          var presentForm = matchCase(word, PAST_TO_PRESENT[lower]);
          issues.push({
            type: "tense",
            start: match.index,
            end: match.index + word.length,
            originalText: word,
            suggestion: presentForm,
            message: "Past tense in an otherwise present-tense narrative. Dialogue is excluded from this check."
          });
        }
      }

      return { issues: issues, dominant: dominant };
    }

    function checkTense() {
      setStatus("Checking tense consistency...");
      var text = document.getElementById("textInput").value;
      var result = checkTenseConsistency(text);
      if (result.dominant === "unclear") {
        currentSuggestions = [];
        renderIssues();
        setStatus("Could not confidently detect a dominant tense - document may be too short or mixed.");
        return;
      }
      currentSuggestions = result.issues;
      renderIssues();
      renderInlineHighlights(text, result.issues);
      setStatus("Found " + currentSuggestions.length + " possible tense issue(s).");
    }

    // ===== RENDERING =====

    function renderIssues() {
      var container = document.getElementById("issuesList");
      container.innerHTML = "";
      if (currentSuggestions.length === 0) {
        container.innerHTML = '<div class="empty-state">No issues found - nice work!</div>';
        return;
      }
      currentSuggestions.forEach(function(issue, index) {
        var div = document.createElement("div");
        div.className = "issue " + issue.type;
        div.innerHTML =
          '<span class="word">' + (issue.originalText || "(insert)") + '</span>' +
          '<span class="arrow"> to </span>' +
          '<span class="fix">' + (issue.suggestion != null ? issue.suggestion : "(no fix)") + '</span>' +
          '<span class="badge">' + issue.type + '</span>' +
          '<br><small>' + issue.message + '</small><br>' +
          '<button data-index="' + index + '">Apply this fix</button>';
        div.querySelector("button").onclick = (function(idx) {
          return function() { applyOneChange(idx); };
        })(index);
        container.appendChild(div);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function renderInlineHighlights(text, suggestions) {
      var readView = document.getElementById("readView");
      var box = document.getElementById("textInput");
      var wordPattern = /[A-Za-z']+/g;
      var lastIndex = 0;
      var html = "";
      var match;
      while ((match = wordPattern.exec(text)) !== null) {
        var word = match[0];
        var start = match.index;
        var end = start + word.length;
        html += escapeHtml(text.slice(lastIndex, start));
        var flag = null;
        for (var i = 0; i < suggestions.length; i++) {
          var s = suggestions[i];
          if (s.end > s.start && s.start === start && s.end === end) {
            flag = s;
            break;
          }
        }
        var cls = "flag";
        if (flag) cls += " flag-" + flag.type;
        html += '<span class="' + cls + '" data-start="' + start + '" data-end="' + end + '">' + escapeHtml(word) + '</span>';
        lastIndex = end;
      }
      html += escapeHtml(text.slice(lastIndex));

      readView.innerHTML = html;
      readView.style.display = "block";
      box.style.display = "none";
    }

    function showEditView() {
      document.getElementById("textInput").style.display = "block";
      document.getElementById("readView").style.display = "none";
    }

    function applyOneChange(index) {
      var issue = currentSuggestions[index];
      if (issue.suggestion === null || issue.suggestion === undefined) return;
      var box = document.getElementById("textInput");
      var text = box.value;

      undoStack.push({ start: issue.start, end: issue.start + issue.suggestion.length, originalText: issue.originalText });
      box.value = text.slice(0, issue.start) + issue.suggestion + text.slice(issue.end);
      showEditView();
      setStatus('Applied: "' + (issue.originalText || "(insert)") + '" to "' + issue.suggestion + '". Re-check to refresh highlights.');
    }

    function applyAllChanges() {
      var box = document.getElementById("textInput");
      var text = box.value;
      var sorted = currentSuggestions.slice().sort(function(a, b) { return b.start - a.start; });

      sorted.forEach(function(issue) {
        if (issue.suggestion === null || issue.suggestion === undefined) return;
        undoStack.push({ start: issue.start, end: issue.start + issue.suggestion.length, originalText: issue.originalText });
        text = text.slice(0, issue.start) + issue.suggestion + text.slice(issue.end);
      });

      box.value = text;
      showEditView();
      setStatus("Applied all fixes. Re-check to refresh highlights.");
    }

    function undoChange() {
      var lastEdit = undoStack.pop();
      if (!lastEdit) { setStatus("Nothing to undo."); return; }
      var box = document.getElementById("textInput");
      var text = box.value;
      box.value = text.slice(0, lastEdit.start) + lastEdit.originalText + text.slice(lastEdit.end);
      showEditView();
      setStatus("Last change undone.");
    }

    // ===== SEAMLESS CHUNKED READ ALOUD =====

    var chunkPromises = [];

    function readAloud() {
      stopRequested = false;
      var text = document.getElementById("textInput").value;
      var chunks = splitIntoChunks(text, CHUNK_SIZE);
      chunkPromises = chunks.map(function() { return null; });
      playChunk(chunks, 0, text);
    }

    function playChunk(chunks, index, fullText) {
      if (stopRequested || index >= chunks.length) {
        setStatus(index >= chunks.length ? "Done reading." : "Stopped.");
        setProgress("");
        return;
      }

      setProgress("Reading part " + (index + 1) + " of " + chunks.length + "...");
      setStatus("Checking this part...");

      if (!chunkPromises[index]) {
        chunkPromises[index] = checkChunk(chunks[index]);
      }

      chunkPromises[index].then(function(suggestions) {
        if (index + 1 < chunks.length && !chunkPromises[index + 1]) {
          chunkPromises[index + 1] = checkChunk(chunks[index + 1]);
        }

        currentSuggestions = suggestions;
        renderIssues();
        renderInlineHighlights(fullText, suggestions);
        setStatus("Reading...");

        var readView = document.getElementById("readView");
        var utterance = new SpeechSynthesisUtterance(chunks[index].text);
        if (selectedVoice) utterance.voice = selectedVoice;

        utterance.onboundary = function(event) {
          if (event.name !== "word") return;
          var globalIdx = chunks[index].globalOffset + event.charIndex;
          var allSpans = readView.querySelectorAll("[data-start]");
          allSpans.forEach(function(span) { span.classList.remove("speaking"); });
          for (var i = 0; i < allSpans.length; i++) {
            var s = parseInt(allSpans[i].dataset.start, 10);
            var e = parseInt(allSpans[i].dataset.end, 10);
            if (globalIdx >= s && globalIdx < e) {
              allSpans[i].classList.add("speaking");
              break;
            }
          }
        };

        utterance.onend = function() {
          if (!stopRequested) playChunk(chunks, index + 1, fullText);
        };

        speechSynthesis.speak(utterance);
      });
    }

    function stopReading() {
      stopRequested = true;
      speechSynthesis.cancel();
      setStatus("Stopped.");
      setProgress("");
    }
  </script>

</body>
</html>
